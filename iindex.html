<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Web-Browser Workspace Controller</title>
    <script type="module">
        import RFB from 'https://jsdelivr.net';
        
        let rfb;
        window.onload = () => {
            const container = document.getElementById('browserDisplayContainer');
            const streamUrl = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/websockify`;
            
            rfb = new RFB(container, streamUrl, { shared: true });
            rfb.scaleViewport = true;
            rfb.resizeSession = true; // Enables active server display scaling handlers
            rfb.background = 'rgb(15, 23, 42)';
        };
    </script>
    <style>
        body { margin: 0; background: #0f172a; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1e293b; padding: 1rem; color: #38bdf8; display: flex; justify-content: space-between; font-family: sans-serif; }
        .browser-container { flex-grow: 1; background: #0b0f19; overflow: hidden; }
        #browserDisplayContainer { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <span>Visual Browser Instance</span>
        <span style="color: #22c55e;">● UNIFIED PROXY STREAM LIVE</span>
    </div>
    <div class="browser-container">
        <div id="browserDisplayContainer"></div>
    </div>
</body>
</html>
