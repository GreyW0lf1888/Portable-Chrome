<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Web-Browser Workspace Controller</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .header {
            width: 100%;
            max-width: 1280px;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        h1 { color: var(--accent); margin: 0; font-size: 1.25rem; }
        .browser-container {
            width: 100%;
            max-width: 1280px;
            flex-grow: 1;
            background: #000;
            border: 2px solid var(--card-bg);
            border-top: none;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
    </style>

<body>

<div class="header">
    <h1>Visual Browser Instance</h1>
    <span style="color: #38bdf8; font-weight: bold; font-size: 0.9rem;">● DISPLAY ENVIRONMENT MAP READY</span>

<div class="browser-container">
    <!-- Embedded VNC Video stream mapping container layer -->
    <iframe id="streamFrame" src=""></iframe>
</div>

<script>
    // Dynamically routes target loopbacks based on hosting cloud provider
    const currentHost = window.location.hostname;
    
    // Default location proxy fallback (Port 8081 stream mapping)
    let streamUrl = `http://${currentHost}:8081/vnc.html?autoconnect=true&resize=scale`;
    
    if (currentHost.includes('github.dev') || currentHost.includes('app.github.dev')) {
        // Formats routing schemas cleanly if tracking inside live GitHub Codespaces
        const baseWorkspaceUrl = window.location.href;
        streamUrl = baseWorkspaceUrl.replace('-8080.', '-8081.');
    }
    
    document.getElementById('streamFrame').src = streamUrl;
</script>
